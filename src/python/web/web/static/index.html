<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conjugation Practice</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Conjugation Practice</h1>
    <div id="user-area" class="user-area"></div>
  </header>

  <!-- Signed-out view -->
  <section id="signed-out" class="signed-out hidden">
    <p>Practice European-Portuguese verb conjugations.</p>
    <a class="btn primary" href="/auth/login">Sign in with Google</a>
  </section>

  <!-- Signed-in view -->
  <main id="app" class="app hidden">
    <div class="controls">
      <label for="verb-select">Verb</label>
      <select id="verb-select"></select>
    </div>

    <!-- Verb banner + accent bar stay pinned to the top together while scrolling. -->
    <div id="sticky-header" class="sticky-header">
      <div id="verb-indicator" class="verb-indicator hidden">
        <span class="vi-label">Conjugating</span>
        <span class="vi-verb"></span>
        <span class="vi-progress"></span>
      </div>
      <div class="accent-bar hidden" id="accent-bar" aria-label="Insert accented character"></div>
    </div>

    <div id="drill" class="drill"></div>

    <!-- Revealed once every field is answered, echoing the header summary. -->
    <div id="footer-controls" class="footer-controls hidden">
      <span id="footer-summary" class="footer-summary"></span>
      <button id="again" class="btn" type="button">Conjugate this verb again</button>
      <div class="next-verb">
        <label for="verb-select-bottom">now conjugate:</label>
        <select id="verb-select-bottom"></select>
      </div>
    </div>
  </main>

  <!-- Settings modal. Choose which tenses to drill and in what order. -->
  <div id="settings-panel" class="settings-panel hidden" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="settings-card">
      <h2>Tense Configuration</h2>
      <p class="settings-hint">Tick the tenses to practise; drag to set their order.</p>
      <ul id="tense-prefs" class="tense-prefs"></ul>
      <p id="settings-error" class="settings-error hidden"></p>
      <div class="settings-actions">
        <button id="settings-save" class="btn primary" type="button">Save</button>
        <button id="settings-close" class="btn ghost" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Interface modal. Label language and accent-button visibility. -->
  <div id="interface-panel" class="settings-panel hidden" role="dialog" aria-modal="true" aria-label="Interface">
    <div class="settings-card">
      <h2>Interface</h2>
      <fieldset class="iface-group">
        <legend>Tense labels</legend>
        <label class="iface-radio"><input type="radio" name="iface-labels" value="en" /> English</label>
        <label class="iface-radio"><input type="radio" name="iface-labels" value="pt" /> Portuguese</label>
      </fieldset>
      <label class="iface-check"><input type="checkbox" id="iface-accents" /> Show accent buttons</label>
      <div class="settings-actions">
        <button id="interface-save" class="btn primary" type="button">Save</button>
        <button id="interface-close" class="btn ghost" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Transient "Correct!" toast; fixed position, never takes focus. -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/static/app.js"></script>
</body>
</html>
